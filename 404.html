<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Lost in Space | Jeswin Jose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a0a0a',
                        accent: '#6366f1',
                        surface: '#fdfdfd',
                        muted: '#64748b'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-surface text-primary antialiased overflow-x-hidden w-full h-screen flex flex-col">
    
    <!-- Navigation -->
    <header id="island-header" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-6xl transition-all duration-500">
        <nav id="island-nav" class="glass rounded-full px-6 md:px-8 py-3 md:py-4 flex justify-between items-center transition-all">
            <div class="text-xl font-extrabold tracking-tighter">
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="flex items-center">
                        <img src="jessign.png" alt="Jeswin Jose" class="h-8 md:h-10 w-auto transition-all duration-300 group-hover:scale-105">
                    </div>
                </a>
            </div>
            <div class="hidden md:flex space-x-10 text-[11px] font-bold tracking-[0.2em] uppercase">
                <a href="index.html#home" class="nav-link">Home</a>
                <a href="index.html#work" class="nav-link">Work</a>
                <a href="about.html" class="nav-link">Who am i ?</a>
                <a href="mallufinance.html" class="nav-link">Company</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="hello.html" class="hidden sm:flex items-center gap-2 text-[10px] font-bold tracking-widest px-6 py-3 bg-primary text-white rounded-full hover:bg-accent transition-all">
                    LET'S TALK
                </a>
            </div>
        </nav>
    </header>

    <main class="flex-grow flex flex-col justify-center items-center px-4 relative overflow-hidden">
        <div class="hero-blob animate-soft-pulse left-[-10%] top-[20%] opacity-15"></div>
        <div class="hero-blob animate-soft-pulse right-[-5%] bottom-[10%] opacity-15 bg-indigo-200"></div>

        <div class="z-10 text-center">
            <div class="relative mb-12">
                <h1 class="text-[10rem] md:text-[18rem] font-heading font-black leading-none tracking-tighter text-primary/5 select-none">404</h1>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <h2 class="text-4xl md:text-7xl font-heading font-extrabold tracking-tight">
                        Lost in <span class="text-transparent bg-clip-text bg-gradient-to-r from-accent to-red-400">Space.</span>
                    </h2>
                </div>
            </div>
            
            <p class="text-muted text-base md:text-xl max-w-md mx-auto mb-12 font-medium leading-relaxed">
                The digital destination you are seeking has drifted outside of our operational perimeter.
            </p>

            <div class="flex flex-col sm:flex-row gap-6 justify-center">
                <a href="index.html" class="px-8 py-4 bg-primary text-white font-bold text-[10px] tracking-[0.2em] rounded-full hover:bg-accent transition-all hover:-translate-y-1">
                    RETURN TO HOME
                </a>
                <a href="index.html#work" class="px-8 py-4 border-2 border-primary/5 bg-white text-primary font-bold text-[10px] tracking-[0.2em] rounded-full hover:border-primary/20 transition-all hover:-translate-y-1">
                    VIEW PORTFOLIO
                </a>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-primary/5 text-center">
        <p class="text-[9px] text-muted uppercase tracking-[0.5em] font-bold">
            &copy; 2026 JESWIN JOSE. ARCHITECTING THE FUTURE.
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
